name: Deploy Supabase Function

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/premiumize-proxy.tsx"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js (for environment compatibility)
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Download and Install Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz -o supabase.tar.gz || { echo "Download failed"; exit 1; }
          tar -xzf supabase.tar.gz || { echo "Extraction failed"; exit 1; }
          chmod +x supabase || { echo "chmod failed"; exit 1; }
          sudo mv supabase /usr/local/bin/supabase || { echo "Move failed"; exit 1; }
          supabase --version || { echo "CLI not working"; exit 1; }

      - name: Deploy Premiumize Proxy Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ajkjsezdaulybvrscoyv
        run: |
          supabase functions deploy premiumize-proxy --project-ref $SUPABASE_PROJECT_REF
        working-directory: ./supabase/functions

      - name: Verify Deployment
        run: |
          curl -X GET "https://ajkjsezdaulybvrscoyv.supabase.co/functions/v1/premiumize-proxy" -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
