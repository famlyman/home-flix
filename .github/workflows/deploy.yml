name: Deploy Supabase Function

on:
  push:
    branches: [main] # Adjust if needed
    paths:
      - "supabase/functions/**" # Catches any change in the directory

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: "18" }
      - run: |
          curl -L https://github.com/supabase/cli/releases/download/v1.136.3/supabase_1.136.3_linux_amd64.tar.gz -o supabase.tar.gz
          tar -xzf supabase.tar.gz
          chmod +x supabase
          sudo mv supabase /usr/local/bin/
          supabase --version
      - env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ajkjsezdaulybvrscoyv
        run: supabase functions deploy premiumize-proxy --project-ref $SUPABASE_PROJECT_REF
        working-directory: ./supabase/functions
